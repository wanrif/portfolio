<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Project Preview Placeholder</title>
  <desc id="desc">Default image shown when a project preview is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <g fill="none" stroke="#64748b" stroke-width="2" opacity="0.45">
    <rect x="140" y="130" width="920" height="415" rx="18" />
    <rect x="180" y="180" width="840" height="48" rx="8" />
    <rect x="180" y="255" width="580" height="24" rx="6" />
    <rect x="180" y="295" width="760" height="24" rx="6" />
    <rect x="180" y="335" width="520" height="24" rx="6" />
  </g>
  <text x="600" y="445" text-anchor="middle" fill="#cbd5e1" font-size="38" font-family="Inter, Segoe UI, sans-serif"
